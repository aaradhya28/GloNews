{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>News Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'news/css/style.css' %}?v=1">

</head>

<body>

<nav class="navbar px-3 d-flex justify-content-between align-items-center">

    
    <a href="{% url 'home' %}" class="navbar-brand d-flex align-items-center">
        <img src="{% static 'uploads/glonewlogo-removebg-preview.png' %}" 
             alt="logo" width="35" height="35" class="me-2">
        <span>GloNews</span>
    </a>

    <div id="datetime" class="text-white fw-semibold"></div>

</nav>

   
    <div class="filter-group text-center mt-4">
        <button class="filter-btn category-btn" onclick="setCategory('technology', this)">Tech</button>
<button class="filter-btn category-btn" onclick="setCategory('sports', this)">Sports</button>
<button class="filter-btn category-btn" onclick="setCategory('business', this)">Business</button>
<button class="filter-btn category-btn" onclick="setCategory('health', this)">Health</button>
    </div>

</div>


<div id="loader" class="text-center" style="display:none;">
    <div class="spinner-border text-primary"></div>
</div>

<div class="container mt-4">

    
    <div class="text-center mb-4">
        <h2 class="fw-bold d-flex align-items-center justify-content-center gap-2"><span class="live-indicator"></span>
    <span class="live-text">LIVE</span>Trending News </h2>
        <p class="text-muted">Stay updated with real-time headlines</p>
    </div>

  
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="input-group shadow-sm">
                <input type="text" id="searchInput" class="form-control" placeholder="Search news...">
                <button class="btn btn-primary" onclick="fetchNews()">Search</button>
            </div>
        </div>
    </div>


    <div class="row" id="newsContainer"></div>

</div>



<script>
let currentCategory = "";


function setActive(button) {
    document.querySelectorAll(".category-btn").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
}

function setCategory(category, btn) {
    currentCategory = category;

    let parent = btn.parentElement;
    let buttons = parent.querySelectorAll(".category-btn");

    buttons.forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    fetchNews();
}

function updateDateTime() {
    let now = new Date();

    let options = {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    };

    let date = now.toLocaleDateString(undefined, options);
    let time = now.toLocaleTimeString();

    document.getElementById("datetime").innerHTML = `${date} | ${time}`;
}


setInterval(updateDateTime, 1000);

updateDateTime();

async function fetchNews() {
    let query = document.getElementById("searchInput").value.trim();

    let url = "/api/news/live/";

    if (currentCategory) {
        url += `?category=${currentCategory}`;
    }

    if (query) {
        url = `/api/news/live/?q=${encodeURIComponent(query)}`;
    }

    document.getElementById("loader").style.display = "block";

    let response = await fetch(url);
    let data = await response.json();

    let container = document.getElementById("newsContainer");
    container.innerHTML = "";

    if (!data.articles || data.articles.length === 0) {
        container.innerHTML = "<h4 class='text-center'>No news found</h4>";
        document.getElementById("loader").style.display = "none";
        return;
    }

    data.articles.forEach(article => {
        let card = `
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm d-flex flex-column">
                <img src="${article.urlToImage || '/static/uploads/default-news.jpg'}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;"
                     onerror="this.src='/static/uploads/news.jpg';">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">${article.title}</h5>
                    <p class="card-text">${article.description || ''}</p>
                    <a href="${article.url}" target="_blank"
                       class="btn btn-primary mt-auto">Read More</a>
                </div>
            </div>
        </div>`;
        container.innerHTML += card;
    });

    document.getElementById("loader").style.display = "none";
}

fetchNews();
</script>

</body>
</html>
